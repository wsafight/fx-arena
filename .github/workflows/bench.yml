name: bench

on:
  push:
    branches: [main]
    paths:
      - 'bench/**'
      - 'report/**'
      - 'metrics/**'
      - 'simple-bench/**'
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/bench.yml'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: install deps
        run: bun install

      - name: resolve playwright version
        id: pw
        run: echo "version=$(bun pm ls 2>/dev/null | grep -oE 'playwright@[0-9.]+' | head -1 | cut -d@ -f2)" >> "$GITHUB_OUTPUT"

      - name: cache playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: install chromium
        run: bunx playwright install --with-deps chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'

      - name: install chromium system deps only
        run: bunx playwright install-deps chromium
        if: steps.pw-cache.outputs.cache-hit == 'true'

      - name: build simple-bench
        run: bun run build:simple
        continue-on-error: true

      - name: run bench
        run: bun run bench

      - name: render report
        run: bun run report:render

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: bench
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
